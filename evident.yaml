version: 0.1
project: proteon-graphein
description: >
  EVIDENT claim manifest for the proteon-graphein integration adapter.
  Conforms to the EVIDENT workflow contract (claim -> trust strategy ->
  oracle -> tolerance -> command -> artifact -> assumptions + failure modes)
  defined at github.com/theGreatHerrLebert/evident.

claims:
  - id: proteon-graphein-residue-feature-parity
    title: Graphein node and graph attributes equal direct proteon API outputs
    case: CASE.md
    source: src
    tier: ci
    trust_strategy:
      - validation
    claim: >
      For every Graphein node matched by add_proteon_features, the attached
      values are exactly equal to what proteon would return when called
      directly on the same PDB. Coverage: (a) residue-level graphs --
      residue_sasa, rsa, dssp, hbond_count, phi/psi/omega; (b) atom-level
      graphs -- per-atom atom_sasa + charge + is_backbone + hetero, and the
      same residue-level features broadcast to every atom of the residue;
      (c) the graph-level proteon_energy dict. The adapter must not lose,
      reorder, round, or rebadge values during residue-key or atom-key
      matching. NaN values in proteon outputs (RSA on non-standard residues,
      phi/psi/omega at chain termini) are tolerated by being absent on the
      graph rather than attached as float('nan').
    evidence:
      oracle:
        - proteon (direct compute_proteon_features call, same process)
      tolerance: >
        Exact equality for floats (SASA, RSA, atom_sasa, charge, dihedrals);
        string equality for DSSP codes; integer equality for hbond_count;
        bool equality for is_backbone / hetero. Same backend, same process,
        no recomputation -- any drift means the adapter mutated a value in
        transport. NaN positions must be absent rather than attached.
      command: >
        /scratch/TMAlign/proteon/.venv/bin/python -m pytest
        tests/test_parity.py -v
      artifact: pytest exit code and captured failure diffs (stdout)
    assumptions:
      - The adapter shares a process and proteon version with the oracle;
        proteon version skew is out of scope for this manifest.
      - Graphein's default residue-level node attributes expose chain_id and
        residue_number; insertion_code is normalized to the empty string when
        absent.
      - Atom-level Graphein graphs expose atom_type alongside chain_id and
        residue_number; alt-loc handling follows Graphein's defaults.
      - Test fixtures live at /scratch/TMAlign/proteon/test-pdbs/ and tests
        skip (not fail) when those files are missing.
    failure_modes:
      - Graphein silently changes its node-id schema, breaking the residue-key
        match while leaving the parity test trivially passing. Mitigation
        n_checked > 0 guard in test_parity_residue_features_match_direct_proteon_call.
      - Graphein silently changes its atom-level node attribute names
        (e.g. renames atom_type), breaking atom-key matching. Mitigation
        n_atom_sasa > 0 guard in
        test_parity_atom_level_features_match_direct_proteon_call.
      - proteon adds a new energy component that the integration test does not
        explicitly check. Mitigation set-equality of energy dict keys in
        test_parity_graph_energy_matches_direct_proteon_call.
      - HETATM residues acquire DSSP codes via a Graphein/proteon residue
        classification disagreement. Mitigation
        test_parity_hetatm_residues_dssp_only_for_aa on the 1ake fixture.
      - proteon residue/atom iteration order diverges from the flat order
        of atom_sasa or backbone_dihedrals arrays. Mitigation atom_sasa
        oracle is built by walking residues -> residue.atoms with a single
        flat counter, and the test re-derives it the same way.

  - id: proteon-graphein-batch-parity
    title: add_proteon_features_batch produces identical results to a loop
    case: CASE.md
    source: src
    tier: ci
    trust_strategy:
      - validation
    claim: >
      For any sequence of (graph, pdb_path) pairs, the graphs returned by
      add_proteon_features_batch(graphs, paths) carry exactly the same
      node and graph attributes as graphs produced by a Python loop calling
      add_proteon_features(graphs[i], paths[i]) one at a time. Tested with
      a heterogeneous batch (residue-level 1crn, atom-level 1ake,
      residue-level 1crn) covering single + atom granularities.
    evidence:
      oracle:
        - add_proteon_features (single-call helper, same process)
      tolerance: >
        Exact equality for every node and graph attribute. The single-call
        helper is itself parity-tested against direct proteon API calls
        (claim proteon-graphein-residue-feature-parity), so this claim is
        transitively a parity claim against proteon.
      command: >
        /scratch/TMAlign/proteon/.venv/bin/python -m pytest
        tests/test_parity.py::test_parity_batch_helper_matches_single_call_loop -v
      artifact: pytest exit code and captured failure diffs (stdout)
    assumptions:
      - proteon's batch primitives (batch_residue_sasa, batch_relative_sasa,
        batch_atom_sasa, batch_dssp, batch_dihedrals, batch_hbond_count,
        batch_compute_energy) produce per-structure results identical to
        their single-call counterparts. proteon ships its own parity tests
        for this contract.
      - Strict mode only -- one bad PDB raises and discards the batch.
        Tolerant batch loading is deferred to a future minor release.
    failure_modes:
      - A future proteon batch primitive drifts from its single-call sibling
        in iteration order or rounding. Mitigation full-attribute-set
        equality assertion in
        test_parity_batch_helper_matches_single_call_loop.
      - Mixing residue and atom-level graphs in one batch silently
        propagates atom-only attributes to residue-level nodes (or vice
        versa). Mitigation per-graph granularity detection plus the
        full-attribute-set equality check on each graph in the batch.

# Deferred claims are tracked separately so the validated manifest never
# carries placeholder evidence (Validation Theater anti-pattern). Each entry
# is promoted into `claims:` only once it has real oracle, tolerance, command,
# and artifact.
deferred_claims:
  - id: proteon-graphein-feature-pack-ablation
    title: Proteon feature pack improves geometric DL on a held-out fold
    intended_tier: research
    blockers:
      - Pre-declared tolerance and decision rule must be written before a
        single training run starts.
      - Demo notebook + ProteinShake split fix not yet drafted.
    notes: >
      Per feedback_framework_agnostic_export, this lives in a separate
      notebook/repo, not in the proteon-graphein core package.
